aid: event-sourcing
name: Event Sourcing
description: >-
  Event sourcing is an architectural pattern where state changes are stored as
  a sequence of immutable events rather than just the current state. Instead of
  storing only the current state of data, event sourcing stores all changes as
  a log of events, enabling complete audit trails, temporal queries, and
  event-driven projections.
